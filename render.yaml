services:
  - type: web
    name: codesage-ai
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn src.app.app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: CODESAGE_ENABLE_MODEL
        value: "0"
      - key: CODESAGE_GITHUB_TOKEN
        sync: false
      - key: CODESAGE_GITHUB_WEBHOOK_SECRET
        sync: false
      - key: CODESAGE_MAX_INLINE_COMMENTS
        value: "20"
