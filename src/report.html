
<!DOCTYPE html>
<html>
<head>
    <title>CodeSage Analysis Report</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .score { font-size: 48px; font-weight: bold; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 20px 0; }
        .stat-card { background: #f8f9fa; padding: 15px; border-radius: 8px; text-align: center; }
        .stat-value { font-size: 32px; font-weight: bold; }
        .critical { color: #dc3545; }
        .high { color: #fd7e14; }
        .medium { color: #ffc107; }
        .low { color: #17a2b8; }
        .issue { background: #f8f9fa; padding: 15px; margin: 10px 0; border-left: 4px solid; border-radius: 4px; }
        .issue.critical { border-color: #dc3545; }
        .issue.high { border-color: #fd7e14; }
        .issue.medium { border-color: #ffc107; }
        .issue.low { border-color: #17a2b8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 CodeSage Analysis Report</h1>
            <div class="score">Score: 95/100</div>
            <p>Status: PASS</p>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value critical">0</div>
                <div>Critical</div>
            </div>
            <div class="stat-card">
                <div class="stat-value high">0</div>
                <div>High</div>
            </div>
            <div class="stat-card">
                <div class="stat-value medium">1</div>
                <div>Medium</div>
            </div>
            <div class="stat-card">
                <div class="stat-value low">0</div>
                <div>Low</div>
            </div>
        </div>
        
        <h2>📋 Issues Found</h2>

        <div class="issue medium">
            <strong>Line 1</strong> - Mutable default argument in add_item()<br>
            <code>def add_item(...)</code><br>
            <em>Fix: Use None as default: def func(arg=None): arg = arg or []</em>
        </div>

    </div>
</body>
</html>
